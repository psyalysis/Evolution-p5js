<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P5.js</title>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>

    <script src="app.js"></script>
    <script>
        let monkeys = [];
        
        let monkeyCount = 3;
        let routeDefinition = 5;

        let frame = 0;
        let step = 0;
        let stepDuration = 100;
        let totalSteps = 8;

        let families = [
            "Bumblefluff",
            "Snickerdoodle",
            "Goobercheeks",
            "Flibberwitz",
            "Bananafoot",
            "Muddlebum",
            "Chompersprocket",
            "Giggletuft",
            "Wobblewhisk",
            "Doodlefizz"
        ];

        let monkeImg;


        function setup() {
            monkeImg = loadImage("./monke.png")
            createCanvas(window.innerWidth - 20, window.innerHeight - 50);
            
            background(0);
            for (i=0;i<monkeyCount; i++) {
                monkeys.push(new Monkey(random(families)));
            }

        }
        function draw() {
            background(0);
            strokeWeight(10)
            stroke("green")
            line(0, 0, width, 0)
            line(width, 0, width, height)
            line(0, height, width, height)
            line(0, 0, 0, height)


            if (frame % stepDuration === 0) {
                if (step < totalSteps) {
                    step++;
                }
            }
            for (m in monkeys) {
                monkeys[m].moveTo(monkeys[m].route[step-1]);
                //text(monkeys[m].family, monkeys[m].position.x, monkeys[m].position.y + 30)
                image(monkeImg, monkeys[m].position.x, monkeys[m].position.y, 60, 50);
            }
            frame++;
        }

        class Monkey {
            constructor(family) {
                this.position = {"x": width / 2, "y": 500};
                this.family = family;
                this.route = [{ x: this.position.x, y: this.position.y }];
                for (let i = 1; i < totalSteps; i++) {
                    this.route.push({
                        x: this.route[i - 1].x + random(-100, 100),
                        y: this.route[i - 1].y + random(-100, 100)
                    });
                }
            }

            moveTo(location) {
                let dx = location.x - this.position.x;
                let dy = location.y - this.position.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                let speed = 4;

                if (dist > speed) {
                    this.position.x += (dx / dist) * speed;
                    this.position.y += (dy / dist) * speed;
                } else if (dist > 0) {
                    // Reached close enough, snap to target
                    this.position.x = location.x;
                    this.position.y = location.y;
                }
                this.position.x = constrain(this.position.x, 0, width - 60);
                this.position.y = constrain(this.position.y, 0, height - 50);
            }
        }

        
    </script>
</body>
</html>
