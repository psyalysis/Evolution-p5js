<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P5.js</title>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>

    <script src="app.js"></script>
    <script>

        let critters = [];
        let food = [];
        let numCritters = 30;
        let moveSpeed = 2;
        let frameCount = 0;
        let gameRate = 10;

        let childSize = 0.75
        let sizeSpeedNerf = 5;

        let redCount = 0;
        let blueCount = 0;

        
        function setup() {
            createCanvas(475, 600);
            for (let i = 0; i < numCritters; i++) {
                critters.push(new Critter(random(["red", "blue"])));
            }
        }
        function draw() {
            if (gameOver()) {
                return;
            }
            
            redCount = 0;
            blueCount = 0;
            
            background(0);
            if (frameCount % (300 / gameRate) === 0) {
                food.push(new Food());
                
            }
            for (let i = 0; i < food.length; i++) {
                fill("green");
                circle(food[i].location.x, food[i].location.y, 10);
            }
            for (let i = 0; i < critters.length; i++) {
                if (critters[i].team === "red") {
                    redCount++;
                } else {
                    blueCount++;
                }
                fill(critters[i].team);
                circle(critters[i].location.x, critters[i].location.y, critters[i].size);
                critters[i].move(food);
                critters[i].eat(food);
                critters[i].kill(critters);

                
            }
            
            fill("white");
            textSize(20);
            text("Red: " + redCount, 10, 20);
            text("Blue: " + blueCount, 10, 40);
            frameCount++;
        }

        function gameOver() {
            if (redCount === 0 && blueCount > 0) {
                text("Blue wins!", width / 2, height / 2);
                return true;
            } else if (blueCount === 0 && redCount > 0) {
                text("Red wins!", width / 2, height / 2);
                return true;
            } else {
                return false;
            }
        }

        class Critter {
            constructor(team, parentSize) {
                this.team = team;
                if (parentSize) {
                    this.size = random(10, 30) * parentSize;
                } else {
                    this.size = random(10, 30);
                }
                this.location = { x: random(0, width), y: random(0, height) };
            }
            move(food) {
                let closestFood = null;
                let minDist = Infinity;
                for (let i = 0; i < food.length; i++) {
                    let d = dist(this.location.x, this.location.y, food[i].location.x, food[i].location.y);
                    if (d < minDist) {
                        minDist = d;
                        closestFood = food[i];
                    }
                }
                if (closestFood) {
                    let direction = [closestFood.location.x - this.location.x, closestFood.location.y - this.location.y];
                    let angle = atan2(direction[1], direction[0]);
                    let moveX = moveSpeed / (this.size / sizeSpeedNerf) * cos(angle);
                    let moveY = moveSpeed / (this.size / sizeSpeedNerf) * sin(angle);
                    this.location.x += moveX * gameRate;
                    this.location.y += moveY * gameRate;
                }
            }
            eat(food) {
                if (food.length > 0) {
                    for (let i = 0; i < food.length; i++) {
                        if (dist(this.location.x, this.location.y, food[i].location.x, food[i].location.y) < this.size / 2) {
                            this.size += food[i].size / (this.size / 5);
                            food.splice(i, 1);
                            critters.push(new Critter(this.team, this.size));
                            }
                        }
                    }
            }
            kill(critters) {
                for (let i = 0; i < critters.length; i++) {
                    if (critters[i].team !== this.team) {
                        if (dist(this.location.x, this.location.y, critters[i].location.x, critters[i].location.y) < this.size / 2) {
                            if (critters[i].size <= this.size) {
                                critters.splice(i, 1);
                            }
                        }
                    }
                }
            }
        }

        class Food {
            constructor() {
                this.size = random(20, 40);
                this.location = { x: random(0, width), y: random(0, height) };
            }
            
        }
    </script>
</body>
</html>
